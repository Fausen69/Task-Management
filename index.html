<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Управление задачами</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">TaskFlow</div>
        <nav class="nav">
            <button class="nav-btn active" data-screen="dashboard">Дашборд</button>
            <button class="nav-btn" data-screen="tasks">Задачи</button>
            <button class="nav-btn" data-screen="create">Создать задачу</button>
        </nav>
    </header>

    <main class="container">
        <section id="dashboard" class="screen active">
            <h2>Обзор</h2>
            <div class="stats">
                <article class="card"><h3>Всего задач</h3><p id="total-tasks">0</p></article>
                <article class="card"><h3>В работе</h3><p id="in-progress">0</p></article>
                <article class="card"><h3>Завершено</h3><p id="completed">0</p></article>
            </div>
        </section>

        <section id="tasks" class="screen">
            <h2>Список задач</h2>
            <ul id="task-list" class="task-list"></ul>
        </section>

        <section id="create" class="screen">
            <h2>Новая задача</h2>
            <form id="task-form" class="form">
                <label for="title">Название</label>
                <input type="text" id="title" required minlength="3">
                
                <label for="priority">Приоритет</label>
                <select id="priority">
                    <option value="low">Низкий</option>
                    <option value="medium">Средний</option>
                    <option value="high">Высокий</option>
                </select>

                <button type="submit">Добавить</button>
                <p id="form-error" class="error"></p>
            </form>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
